name: Deploy to GH Pages

on:
    # Run after the E2E Tests workflow finishes on main
    workflow_run:
        workflows: 
            - E2E Tests
        branches: 
            - "main"
        types:
            - completed

permissions:
    contents: write

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            #  checkout my codebase
            - name: Checkout tested commit
              uses: actions/checkout@v7
              with:
                ref: ${{ github.event.workflow_run.head_sha }}
            #  set up their node environment
            - name: set up Node.js
              uses: actions/setup-node@v6
              with:
                node-version: 24
                # This caches the download packages between workflows run, to make it run faster
                cache: npm
            #  install the projects dependencies
            - name: Install dependencies
              run: npm ci
            # build our project
            - name: Build project
              run: npm run build
            # deploy our project
            - name: deploy app
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                
              run: |
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git config --global user.name "github-actions[bot]"
                REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
                npx gh-pages -d dist -r "$REPO"